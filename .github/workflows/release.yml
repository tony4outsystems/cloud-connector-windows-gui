name: Build and release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create or update, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

env:
  DOTNET_VERSION: "10.0.x"
  ARTIFACT_NAME: cloud-connector-windows-gui-win-x64
  GUI_REPO_PATH: cloud-connector-windows-gui

jobs:
  release:
    name: Build Windows package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GUI
        uses: actions/checkout@v4
        with:
          path: ${{ env.GUI_REPO_PATH }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish win-x64 package
        working-directory: ${{ env.GUI_REPO_PATH }}
        run: |
          dotnet test tests/cloud-connector-windows-gui.Core.Tests/cloud-connector-windows-gui.Core.Tests.csproj
          dotnet publish src/cloud-connector-windows-gui/cloud-connector-windows-gui.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -o artifacts/win-x64

      - name: Zip package
        working-directory: ${{ env.GUI_REPO_PATH }}/artifacts/win-x64
        run: zip -r "../${ARTIFACT_NAME}.zip" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.GUI_REPO_PATH }}/artifacts/${{ env.ARTIFACT_NAME }}.zip
          if-no-files-found: error

      - name: Publish GitHub release
        working-directory: ${{ env.GUI_REPO_PATH }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          RELEASE_ASSET: artifacts/${{ env.ARTIFACT_NAME }}.zip
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$RELEASE_ASSET" --clobber
          else
            gh release create "$RELEASE_TAG" "$RELEASE_ASSET" \
              --title "$RELEASE_TAG" \
              --generate-notes \
              --target "$GITHUB_SHA"
          fi
