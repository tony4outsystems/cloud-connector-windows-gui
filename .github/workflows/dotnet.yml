name: .NET

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Build and Test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore cloud-connector-gui.sln

      - name: Build
        run: dotnet build cloud-connector-gui.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/cloud-connector-gui.Core.Tests/cloud-connector-gui.Core.Tests.csproj --configuration Release --no-restore

  publish:
    name: Publish ${{ matrix.rid }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
          - rid: osx-x64
            os: macos-latest
          - rid: osx-arm64
            os: macos-latest
          - rid: linux-x64
            os: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish GUI
        run: >
          dotnet publish src/cloud-connector-gui/cloud-connector-gui.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          --output artifacts/${{ matrix.rid }}

      - name: Install vpk
        run: dotnet tool install --global vpk

      - name: Compute version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.1" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack (Windows, portable only)
        if: runner.os == 'Windows'
        run: >
          vpk pack
          --packId cloud-connector-gui
          --packVersion ${{ steps.version.outputs.version }}
          --packDir artifacts/${{ matrix.rid }}
          --mainExe cloud-connector-gui.exe
          --outputDir release/${{ matrix.rid }}
          --channel ${{ matrix.rid }}
          --icon src/cloud-connector-gui/Assets/outsystems.ico
          --noInst

      - name: Pack (macOS, portable only)
        if: runner.os == 'macOS'
        run: >
          vpk pack
          --packId cloud-connector-gui
          --packVersion ${{ steps.version.outputs.version }}
          --packDir artifacts/${{ matrix.rid }}
          --mainExe cloud-connector-gui
          --outputDir release/${{ matrix.rid }}
          --channel ${{ matrix.rid }}
          --icon src/cloud-connector-gui/Assets/outsystems.icns
          --signAppIdentity -
          --noInst

      - name: Pack (Linux, portable AppImage)
        if: runner.os == 'Linux'
        run: >
          vpk pack
          --packId cloud-connector-gui
          --packVersion ${{ steps.version.outputs.version }}
          --packDir artifacts/${{ matrix.rid }}
          --mainExe cloud-connector-gui
          --outputDir release/${{ matrix.rid }}
          --channel ${{ matrix.rid }}
          --icon src/cloud-connector-gui/Assets/outsystems.png

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloud-connector-gui-${{ matrix.rid }}
          path: release/${{ matrix.rid }}
          if-no-files-found: ignore

      - name: Upload GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        run: >
          vpk upload github
          --repoUrl https://github.com/${{ github.repository }}
          --token ${{ github.token }}
          --outputDir release/${{ matrix.rid }}
          --channel ${{ matrix.rid }}
          --tag ${{ github.ref_name }}
          --merge
          --publish
